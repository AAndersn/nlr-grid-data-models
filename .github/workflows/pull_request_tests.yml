name: Pytest

on: pull_request

jobs:
  ci_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp]"
      - name: Verify MCP installation
        run: |
          python -c "import importlib.metadata as md; import mcp.server; print(f'MCP version: {md.version(\"mcp\")}')"
      - name: Run pytest
        run: |
          pytest -v --cov --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: NREL-Distribution-Suites/grid-data-models
          fail_ci_if_error: false
          verbose: true
  ci_ruff:
    runs-on: ubuntu-latest
    name: "ruff"
    steps:
      - uses: davidslusser/actions_python_ruff@v1.0.3
        with:
          command: "ruff check src"
          pip_install_command: "pip install -e .[dev,mcp]"
          python_version: "3.13"
